<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模块加载测试</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-result {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>JavaScript 模块加载测试</h1>
  <div id="results"></div>

  <script type="module">
    const resultsDiv = document.getElementById('results');

    function addResult(message, isSuccess) {
      const div = document.createElement('div');
      div.className = `test-result ${isSuccess ? 'success' : 'error'}`;
      div.textContent = message;
      resultsDiv.appendChild(div);
    }

    async function testModules() {
      // 测试 1: 加载 utils/api.js
      try {
        const apiModule = await import('./js/utils/api.js');
        addResult('✅ utils/api.js 加载成功', true);
        console.log('api.js exports:', Object.keys(apiModule));
      } catch (error) {
        addResult('❌ utils/api.js 加载失败: ' + error.message, false);
        console.error('api.js error:', error);
      }

      // 测试 2: 加载 modules/users.js
      try {
        const usersModule = await import('./js/modules/users.js');
        addResult('✅ modules/users.js 加载成功', true);
        console.log('users.js exports:', Object.keys(usersModule));
      } catch (error) {
        addResult('❌ modules/users.js 加载失败: ' + error.message, false);
        console.error('users.js error:', error);
      }

      // 测试 3: 加载 modules/audit.js
      try {
        const auditModule = await import('./js/modules/audit.js');
        addResult('✅ modules/audit.js 加载成功', true);
        console.log('audit.js exports:', Object.keys(auditModule));
      } catch (error) {
        addResult('❌ modules/audit.js 加载失败: ' + error.message, false);
        console.error('audit.js error:', error);
      }

      // 测试 4: 检查其他依赖
      try {
        await import('./js/ui/toast.js');
        addResult('✅ ui/toast.js 加载成功', true);
      } catch (error) {
        addResult('❌ ui/toast.js 加载失败: ' + error.message, false);
      }

      try {
        await import('./js/ui/dialog.js');
        addResult('✅ ui/dialog.js 加载成功', true);
      } catch (error) {
        addResult('❌ ui/dialog.js 加载失败: ' + error.message, false);
      }

      try {
        await import('./js/ui/loading.js');
        addResult('✅ ui/loading.js 加载成功', true);
      } catch (error) {
        addResult('❌ ui/loading.js 加载失败: ' + error.message, false);
      }

      addResult('测试完成，请查看浏览器控制台获取详细信息', true);
    }

    testModules();
  </script>
</body>
</html>
