<article class="workspace-panel active" data-panel="overview" aria-labelledby="overview-title">
  <div class="overview-title-text">
    <p class="eyebrow">Today / Production desk</p>
    <h1 id="overview-title">工作台值班</h1>
  </div>
  <div class="overview-date-badge" id="overview-date-badge" role="status" aria-live="polite" aria-label="当前日期和时间"></div>

  <section class="overview-hero-layout" aria-labelledby="role-title">
    <article class="overview-hero-card">
      <p class="eyebrow" id="role-pill">管理员工作台</p>
      <h2 class="overview-hero-title" id="role-title">把今天的素材、审片和交付放在同一张桌面上。</h2>
      <p class="overview-hero-lede" id="role-description">先看总览，再进入素材审核、借出审批、设备管理和系统配置。</p>
      <p class="overview-hero-message" id="home-hero-message"></p>
      <ul class="hero-stats" id="dashboard-stats" aria-label="工作台概览统计"></ul>
      <div class="overview-hero-actions" aria-label="概览主要操作">
        <button class="primary-btn" data-jump="media" type="button">查看素材库</button>
        <button class="ghost-btn" data-jump="review" type="button">进入审片中心</button>
      </div>
    </article>

    <aside class="overview-side-stack" aria-label="侧边面板">
      <section class="overview-panel" id="overview-alerts-panel" aria-labelledby="overview-alerts-title">
        <div class="overview-panel-head">
          <h3 id="overview-alerts-title">待处理提醒</h3>
          <span class="overview-panel-meta">Alerts</span>
        </div>
        <div class="overview-alerts" id="overview-alerts" aria-live="polite"></div>
      </section>

      <section class="overview-panel" id="overview-chart-panel" aria-labelledby="overview-chart-title">
        <div class="overview-panel-head">
          <h3 id="overview-chart-title">素材分类</h3>
          <span class="overview-panel-meta">Media</span>
        </div>
        <div id="media-chart-container" aria-label="素材分类统计"></div>
      </section>

      <section class="overview-panel" id="overview-storage-panel" aria-labelledby="overview-storage-title">
        <div class="overview-panel-head">
          <h3 id="overview-storage-title">存储空间</h3>
          <span class="overview-panel-meta">Storage</span>
        </div>
        <div id="storage-chart-container" aria-label="素材盘容量占用"></div>
      </section>

      <section class="overview-panel" id="overview-shortcuts-panel" aria-labelledby="overview-shortcuts-title">
        <div class="overview-panel-head">
          <h3 id="overview-shortcuts-title">快捷操作</h3>
          <span class="overview-panel-meta">Actions</span>
        </div>
        <div class="overview-shortcuts" id="overview-shortcuts" aria-label="常用快捷操作"></div>
      </section>
    </aside>
  </section>

  <section class="overview-board" aria-label="工作台下方面板">
    <article class="overview-panel overview-board-panel" aria-labelledby="overview-focus-title">
      <div class="overview-panel-head">
        <h3 id="overview-focus-title">今日重点</h3>
        <span class="overview-panel-meta">Focus</span>
      </div>
      <div class="overview-focus" id="overview-focus"></div>
    </article>

    <article class="overview-panel overview-board-panel" aria-labelledby="overview-activity-title">
      <div class="overview-panel-head">
        <div class="overview-panel-head-text">
          <h3 id="overview-activity-title">最近动态</h3>
          <span class="overview-panel-meta">Timeline</span>
        </div>
        <div class="activity-filter-row" id="activity-filters" role="group" aria-label="筛选最近动态类型">
          <button class="filter-chip is-active" data-activity-filter="all" type="button" aria-pressed="true">全部</button>
          <button class="filter-chip" data-activity-filter="media" type="button" aria-pressed="false">素材</button>
          <button class="filter-chip" data-activity-filter="device" type="button" aria-pressed="false">设备</button>
          <button class="filter-chip" data-activity-filter="borrow" type="button" aria-pressed="false">借用</button>
          <button class="filter-chip" data-activity-filter="review" type="button" aria-pressed="false">审核</button>
          <button class="filter-chip" data-activity-filter="member" type="button" aria-pressed="false">成员</button>
          <button class="filter-chip" data-activity-filter="system" type="button" aria-pressed="false">系统</button>
        </div>
      </div>
      <div class="overview-timeline" id="activity-list" role="feed" aria-label="最近动态列表" aria-live="polite"></div>
      <div class="pagination activity-pagination" id="activity-pagination" aria-label="最近动态分页" hidden>
        <button class="pagination__prev" type="button" aria-label="上一页">←</button>
        <span class="pagination__info" aria-live="polite">第 1 页</span>
        <button class="pagination__next" type="button" aria-label="下一页">→</button>
      </div>
    </article>
  </section>
</article>
