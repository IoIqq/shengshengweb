<article class="workspace-panel reveal" data-panel="todo">
  <div class="panel-head">
    <div>
      <p class="eyebrow">待办事项</p>
      <h2>今日工作清单</h2>
    </div>
    <span class="panel-badge" id="todo-open-count">0 项未完成</span>
  </div>

  <form class="todo-form" id="todo-form">
    <label class="field">
      <span>新增待办</span>
      <input name="title" type="text" placeholder="输入一个明确的工作任务" />
    </label>
    <label class="field">
      <span>截止日期</span>
      <input name="dueDate" type="date" />
    </label>
    <label class="field">
      <span>负责人</span>
      <select name="assigneeId" id="todo-assignee-select">
        <option value="">未分配</option>
      </select>
    </label>
    <label class="field">
      <span>优先级</span>
      <select name="priority">
        <option value="高">高优先</option>
        <option value="中" selected>中优先</option>
        <option value="低">低优先</option>
      </select>
    </label>
    <button class="primary-btn" type="submit">添加待办</button>
  </form>

  <div class="todo-list" id="todo-list"></div>
</article>
