<article class="workspace-panel" data-panel="device">
  <div class="panel-head">
    <div>
      <p class="eyebrow">设备登记</p>
      <h2>设备台账与状态</h2>
    </div>
    <div class="panel-actions">
      <button class="primary-btn" id="device-add-btn" type="button" hidden>+ 新增设备</button>
      <button class="ghost-btn" id="device-refresh-btn" type="button">刷新设备</button>
    </div>
  </div>

  <!-- 统计芯片兼做筛选：点「借出 N」即筛借出，复用 #device-filters 既有 [data-filter] 委托 -->
  <div class="filter-row device-stat-filters" id="device-filters"></div>

  <div class="device-toolbar">
    <label class="search-field">
      <span>搜索设备</span>
      <input id="device-search" type="search" placeholder="按名称、类别、编号、负责人或备注搜索" />
    </label>
    <div class="device-view-toggle" role="group" aria-label="台账视图切换">
      <button class="view-toggle-btn is-active" id="device-view-table" type="button" aria-pressed="true">表格</button>
      <button class="view-toggle-btn" id="device-view-grid" type="button" aria-pressed="false">卡片</button>
    </div>
  </div>

  <div class="device-list" id="device-list"></div>
</article>
