<article class="workspace-panel reveal" data-panel="device">
  <div class="panel-head">
    <div>
      <p class="eyebrow">设备登记</p>
      <h2>设备台账与状态</h2>
    </div>
    <div class="panel-actions">
      <span class="panel-badge" id="device-count">0 台设备</span>
      <button class="ghost-btn" id="device-refresh-btn" type="button">刷新设备</button>
    </div>
  </div>

  <form class="device-form" id="device-form">
    <input type="hidden" name="id" id="device-form-id" value="" />
    <label class="field">
      <span>设备名称</span>
      <input name="name" type="text" placeholder="例如：摄像机 A1" required />
    </label>
    <label class="field">
      <span>设备类别</span>
      <input name="category" type="text" placeholder="例如：摄影 / 收音 / 电脑" list="device-cat-list" required />
      <datalist id="device-cat-list"></datalist>
    </label>
    <label class="field">
      <span>设备编号</span>
      <input name="assetNo" type="text" placeholder="例如：DEV-001" required />
    </label>
    <label class="field">
      <span>序列号 / SN</span>
      <input name="serialNo" type="text" placeholder="厂家序列号（可选）" />
    </label>
    <label class="field">
      <span>规格型号</span>
      <input name="model" type="text" placeholder="例如：Sony A7M4" />
    </label>
    <label class="field">
      <span>设备状态</span>
      <select name="status">
        <option value="available">可借</option>
        <option value="borrowed">已借出</option>
        <option value="maintenance">维护中</option>
      </select>
    </label>
    <label class="field">
      <span>购入日期</span>
      <input name="purchaseDate" type="date" />
    </label>
    <label class="field">
      <span>保修截止</span>
      <input name="warrantyUntil" type="date" />
    </label>
    <label class="field">
      <span>采购价格（元）</span>
      <input name="price" type="number" min="0" step="0.01" placeholder="例如：12999.00" />
    </label>
    <label class="field">
      <span>存放位置</span>
      <input name="location" type="text" placeholder="例如：资料室 A 架" list="device-loc-list" />
      <datalist id="device-loc-list"></datalist>
    </label>
    <label class="field">
      <span>责任人</span>
      <input name="owner" type="text" placeholder="例如：王老师" list="device-owner-list" />
      <datalist id="device-owner-list"></datalist>
    </label>
    <label class="field device-image-field">
      <span>设备图片</span>
      <div class="device-image-uploader">
        <div class="device-image-preview-wrap">
          <img id="device-image-preview" alt="设备图片预览" hidden />
          <span class="device-image-empty" aria-hidden="true">未选择</span>
        </div>
        <div class="device-image-actions">
          <button class="ghost-btn" type="button" id="device-image-upload-btn">选择图片</button>
          <button class="ghost-btn" type="button" id="device-image-clear" hidden>清除</button>
        </div>
        <input id="device-image-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
        <input type="hidden" name="image" id="device-image-url" value="" />
      </div>
    </label>
    <label class="field">
      <span>备注</span>
      <input name="note" type="text" placeholder="补充说明、使用手册链接等" />
    </label>
    <div class="device-form-actions">
      <button class="primary-btn" id="device-form-submit" type="submit">保存设备</button>
      <button class="ghost-btn" id="device-form-cancel" type="button" hidden>取消编辑</button>
    </div>
  </form>

  <div class="toolbar">
    <label class="search-field">
      <span>搜索设备</span>
      <input id="device-search" type="search" placeholder="按名称、类别、编号、负责人或备注搜索" />
    </label>
  </div>

  <div class="toolbar">
    <div class="filter-row" id="device-filters">
      <button class="filter-chip is-active" data-filter="all" type="button">全部</button>
      <button class="filter-chip" data-filter="available" type="button">可借</button>
      <button class="filter-chip" data-filter="borrowed" type="button">已借出</button>
      <button class="filter-chip" data-filter="maintenance" type="button">维护中</button>
    </div>
  </div>

  <div class="device-list" id="device-list"></div>
</article>
