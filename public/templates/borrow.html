<article class="workspace-panel" data-panel="borrow">
  <div class="panel-head">
    <div>
      <p class="eyebrow">借出申请</p>
      <h2>申请、审批与归还</h2>
    </div>
    <div class="panel-actions">
      <button class="primary-btn" id="borrow-add-btn" type="button">+ 提交申请</button>
      <button class="ghost-btn" id="borrow-refresh-btn" type="button">刷新申请</button>
    </div>
  </div>

  <!-- 统计芯片兼做筛选：点「待审 N」即筛待审，复用 #borrow-filters 既有 [data-filter] 委托 -->
  <div class="filter-row borrow-stat-filters" id="borrow-filters"></div>

  <div class="borrow-toolbar">
    <label class="search-field">
      <span>搜索借出</span>
      <input id="borrow-search" type="search" placeholder="按申请人、设备、用途、状态搜索" />
    </label>
    <div class="borrow-view-toggle" role="group" aria-label="借出视图切换">
      <button class="view-toggle-btn is-active" id="borrow-view-table" type="button" aria-pressed="true">表格</button>
      <button class="view-toggle-btn" id="borrow-view-grid" type="button" aria-pressed="false">卡片</button>
    </div>
  </div>

  <div class="borrow-list" id="borrow-list"></div>
</article>
